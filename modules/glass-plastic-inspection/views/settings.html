<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Glass & Plastic Inspection Settings - FS Monitoring</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(8, 145, 178, 0.3);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: white; color: #0891b2; }
        .btn-primary:hover { background: #ecfeff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .card-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .form-group label { font-size: 0.875rem; font-weight: 500; color: #374151; }
        
        .form-group input, .form-group select, .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #0891b2;
            box-shadow: 0 0 0 3px rgba(8, 145, 178, 0.1);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .item-list {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
        
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background: #f9fafb; }
        
        .item-info h4 { font-weight: 600; color: #1f2937; margin-bottom: 0.25rem; }
        .item-info span { font-size: 0.85rem; color: #6b7280; }
        .item-info .location-tag { 
            display: inline-block;
            background: #e0f2fe;
            color: #0369a1;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-top: 0.25rem;
        }
        
        .item-actions { display: flex; gap: 0.5rem; }
        
        .add-item-form {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .add-item-form input, .add-item-form select {
            flex: 1;
            min-width: 150px;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
        }
        
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
            margin-bottom: 1.5rem;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
            font-weight: 500;
            color: #6b7280;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        
        .tab:hover { color: #0891b2; }
        .tab.active { color: #0891b2; border-bottom-color: #0891b2; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .empty-state { text-align: center; padding: 2rem; color: #6b7280; }
        
        .info-box {
            background: #ecfeff;
            border: 1px solid #cffafe;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            color: #0e7490;
        }
        
        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .form-row { grid-template-columns: 1fr; }
            .add-item-form { flex-direction: column; }
            .tabs { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Settings</h1>
            <div class="header-actions">
                <a href="/glass-plastic-inspection" class="btn btn-secondary">← Back</a>
                <a href="/dashboard" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div id="alertContainer"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('general')">General</button>
            <button class="tab" onclick="switchTab('locations')">Locations</button>
            <button class="tab" onclick="switchTab('items')">Items</button>
        </div>
        
        <!-- General Settings Tab -->
        <div id="generalTab" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <h2>📋 Document Settings</h2>
                </div>
                
                <form id="settingsForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="creation_date">Creation Date</label>
                            <input type="date" id="creation_date" name="creation_date">
                        </div>
                        <div class="form-group">
                            <label for="last_revision">Last Revision</label>
                            <input type="date" id="last_revision" name="last_revision">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="edition">Edition</label>
                            <input type="text" id="edition" name="edition" placeholder="e.g., 1.0">
                        </div>
                        <div class="form-group">
                            <label for="reference">Reference</label>
                            <input type="text" id="reference" name="reference" placeholder="e.g., GMRL-GPI-001">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success">💾 Save Settings</button>
                </form>
            </div>
        </div>
        
        <!-- Locations Tab -->
        <div id="locationsTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2>📍 Manage Locations</h2>
                </div>
                
                <div class="add-item-form">
                    <input type="text" id="newLocationName" placeholder="Location Name (e.g., Kitchen)">
                    <input type="text" id="newLocationCode" placeholder="Location Code (optional)">
                    <button class="btn btn-success" onclick="addLocation()">+ Add Location</button>
                </div>
                
                <div class="item-list" id="locationsList">
                    <div class="empty-state">Loading locations...</div>
                </div>
            </div>
        </div>
        
        <!-- Items Tab -->
        <div id="itemsTab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2>🔍 Manage Glass/Plastic Items</h2>
                </div>
                
                <div class="info-box">
                    ℹ️ Items are linked to specific locations. When adding an item, select which location it belongs to.
                </div>
                
                <div class="add-item-form">
                    <select id="newItemLocation">
                        <option value="">Select Location</option>
                    </select>
                    <input type="text" id="newItemName" placeholder="Item Name (e.g., Light Covers)">
                    <input type="text" id="newItemCode" placeholder="Item Code (optional)">
                    <button class="btn btn-success" onclick="addItem()">+ Add Item</button>
                </div>
                
                <div class="item-list" id="itemsList">
                    <div class="empty-state">Loading items...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let locations = [];
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
        }
        
        async function loadSettings() {
            try {
                const response = await fetch('/glass-plastic-inspection/api/settings');
                const settings = await response.json();
                if (settings.creation_date) document.getElementById('creation_date').value = settings.creation_date;
                if (settings.last_revision) document.getElementById('last_revision').value = settings.last_revision;
                if (settings.edition) document.getElementById('edition').value = settings.edition;
                if (settings.reference) document.getElementById('reference').value = settings.reference;
            } catch (err) {
                console.error('Error loading settings:', err);
            }
        }
        
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const settings = {};
            formData.forEach((value, key) => settings[key] = value);
            
            try {
                const response = await fetch('/glass-plastic-inspection/api/settings', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(settings)
                });
                if (response.ok) {
                    showAlert('Settings saved successfully!', 'success');
                } else {
                    showAlert('Failed to save settings', 'error');
                }
            } catch (err) {
                console.error('Error saving settings:', err);
                showAlert('Failed to save settings', 'error');
            }
        });
        
        async function loadLocations() {
            try {
                const response = await fetch('/glass-plastic-inspection/api/locations');
                locations = await response.json();
                const container = document.getElementById('locationsList');
                const itemLocationSelect = document.getElementById('newItemLocation');
                
                // Update locations list
                if (locations.length === 0) {
                    container.innerHTML = '<div class="empty-state">No locations added yet</div>';
                } else {
                    container.innerHTML = locations.map(location => `
                        <div class="item-row">
                            <div class="item-info">
                                <h4>${location.location_name}</h4>
                                <span>${location.location_code || 'No code'}</span>
                            </div>
                            <div class="item-actions">
                                <button class="btn btn-sm btn-danger" onclick="deleteLocation(${location.id})">Delete</button>
                            </div>
                        </div>
                    `).join('');
                }
                
                // Update item location dropdown
                itemLocationSelect.innerHTML = '<option value="">Select Location</option>';
                locations.forEach(location => {
                    const option = document.createElement('option');
                    option.value = location.id;
                    option.textContent = location.location_name;
                    itemLocationSelect.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading locations:', err);
            }
        }
        
        async function addLocation() {
            const name = document.getElementById('newLocationName').value.trim();
            const code = document.getElementById('newLocationCode').value.trim();
            
            if (!name) {
                showAlert('Please enter a location name', 'error');
                return;
            }
            
            try {
                const response = await fetch('/glass-plastic-inspection/api/locations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location_name: name, location_code: code })
                });
                
                if (response.ok) {
                    document.getElementById('newLocationName').value = '';
                    document.getElementById('newLocationCode').value = '';
                    loadLocations();
                    showAlert('Location added successfully!', 'success');
                } else {
                    showAlert('Failed to add location', 'error');
                }
            } catch (err) {
                console.error('Error adding location:', err);
                showAlert('Failed to add location', 'error');
            }
        }
        
        async function deleteLocation(id) {
            if (!confirm('Delete this location? Items linked to this location will be orphaned.')) return;
            
            try {
                const response = await fetch(`/glass-plastic-inspection/api/locations/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadLocations();
                    loadItems();
                    showAlert('Location deleted successfully!', 'success');
                } else {
                    showAlert('Failed to delete location', 'error');
                }
            } catch (err) {
                console.error('Error deleting location:', err);
                showAlert('Failed to delete location', 'error');
            }
        }
        
        async function loadItems() {
            try {
                const response = await fetch('/glass-plastic-inspection/api/items');
                const items = await response.json();
                const container = document.getElementById('itemsList');
                
                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state">No items added yet</div>';
                    return;
                }
                
                container.innerHTML = items.map(item => `
                    <div class="item-row">
                        <div class="item-info">
                            <h4>${item.item_name}</h4>
                            <span>${item.item_code || 'No code'}</span>
                            <div class="location-tag">📍 ${item.location_name || 'Unknown Location'}</div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-sm btn-danger" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading items:', err);
            }
        }
        
        async function addItem() {
            const locationId = document.getElementById('newItemLocation').value;
            const name = document.getElementById('newItemName').value.trim();
            const code = document.getElementById('newItemCode').value.trim();
            
            if (!locationId) {
                showAlert('Please select a location', 'error');
                return;
            }
            
            if (!name) {
                showAlert('Please enter an item name', 'error');
                return;
            }
            
            try {
                const response = await fetch('/glass-plastic-inspection/api/items', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ location_id: parseInt(locationId), item_name: name, item_code: code })
                });
                
                if (response.ok) {
                    document.getElementById('newItemLocation').value = '';
                    document.getElementById('newItemName').value = '';
                    document.getElementById('newItemCode').value = '';
                    loadItems();
                    showAlert('Item added successfully!', 'success');
                } else {
                    showAlert('Failed to add item', 'error');
                }
            } catch (err) {
                console.error('Error adding item:', err);
                showAlert('Failed to add item', 'error');
            }
        }
        
        async function deleteItem(id) {
            if (!confirm('Delete this item?')) return;
            
            try {
                const response = await fetch(`/glass-plastic-inspection/api/items/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadItems();
                    showAlert('Item deleted successfully!', 'success');
                } else {
                    showAlert('Failed to delete item', 'error');
                }
            } catch (err) {
                console.error('Error deleting item:', err);
                showAlert('Failed to delete item', 'error');
            }
        }
        
        loadSettings();
        loadLocations();
        loadItems();
    </script>
</body>
</html>
