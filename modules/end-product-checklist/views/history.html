<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>End-Product Checklist History - FS Monitoring</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.3);
        }
        
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: white; color: #059669; }
        .btn-primary:hover { background: #ecfdf5; }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .card-header h2 { font-size: 1.125rem; font-weight: 600; color: #1f2937; }
        
        .filter-bar {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label { font-size: 0.875rem; font-weight: 500; color: #374151; }
        
        .form-group input, .form-group select {
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        
        .table-container { overflow-x: auto; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }
        
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        tr:hover { background: #f9fafb; }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-verified { background: #d1fae5; color: #065f46; }
        .status-pending { background: #fef3c7; color: #92400e; }
        
        .action-buttons { display: flex; gap: 0.5rem; }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            overflow-y: auto;
        }
        
        .modal.show { display: flex; align-items: flex-start; justify-content: center; padding: 2rem; }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .modal-header h3 { font-size: 1.25rem; font-weight: 600; }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .modal-body { padding: 1.5rem; }
        
        .detail-section {
            margin-bottom: 1.5rem;
        }
        
        .detail-section h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #059669;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #d1fae5;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .detail-item label {
            font-size: 0.75rem;
            color: #6b7280;
            text-transform: uppercase;
            display: block;
            margin-bottom: 0.25rem;
        }
        
        .detail-item span {
            font-weight: 500;
            color: #1f2937;
        }
        
        .checklist-result {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .checklist-result:last-child { border-bottom: none; }
        
        .result-yes { color: #059669; font-weight: 600; }
        .result-no { color: #dc2626; font-weight: 600; }
        .result-na { color: #9ca3af; }
        
        .corrective-note {
            font-size: 0.85rem;
            color: #dc2626;
            background: #fef2f2;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
        }
        
        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .filter-bar { flex-direction: column; width: 100%; }
            .filter-bar .form-group { width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📊 Checklist History</h1>
            <div class="header-actions">
                <a href="/end-product-checklist/form" class="btn btn-primary">+ New Checklist</a>
                <a href="/end-product-checklist" class="btn btn-secondary">← Back</a>
                <a href="/dashboard" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>
    </header>
    
    <div class="container">
        <!-- Filters -->
        <div class="card">
            <div class="card-header">
                <h2>🔍 Filter Records</h2>
            </div>
            <div class="filter-bar">
                <div class="form-group">
                    <label for="filterFrom">From Date</label>
                    <input type="date" id="filterFrom">
                </div>
                <div class="form-group">
                    <label for="filterTo">To Date</label>
                    <input type="date" id="filterTo">
                </div>
                <div class="form-group">
                    <label for="filterBranch">Branch</label>
                    <select id="filterBranch">
                        <option value="">All Branches</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filterStatus">Status</label>
                    <select id="filterStatus">
                        <option value="">All</option>
                        <option value="pending">Pending</option>
                        <option value="verified">Verified</option>
                    </select>
                </div>
                <button class="btn btn-success" onclick="loadDocuments()">Apply Filters</button>
            </div>
        </div>
        
        <!-- Documents Table -->
        <div class="card">
            <div class="card-header">
                <h2>📋 Checklist Records</h2>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Document #</th>
                            <th>Date</th>
                            <th>Branch</th>
                            <th>Product</th>
                            <th>Filled By</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="documentsTable">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                                        <rect x="9" y="3" width="6" height="4" rx="2"/>
                                    </svg>
                                    <p>Loading documents...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- View Modal -->
    <div id="viewModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 Checklist Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>
    
    <script>
        // Load branches for filter
        async function loadBranches() {
            try {
                const response = await fetch('/end-product-checklist/api/branches');
                const branches = await response.json();
                const select = document.getElementById('filterBranch');
                
                branches.forEach(branch => {
                    const option = document.createElement('option');
                    option.value = branch.id;
                    option.textContent = branch.branch_name;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading branches:', err);
            }
        }
        
        // Load documents
        async function loadDocuments() {
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            const branch = document.getElementById('filterBranch').value;
            const status = document.getElementById('filterStatus').value;
            
            let url = '/end-product-checklist/api/documents?';
            if (from) url += `from=${from}&`;
            if (to) url += `to=${to}&`;
            if (branch) url += `branch_id=${branch}&`;
            
            try {
                const response = await fetch(url);
                let documents = await response.json();
                
                // Filter by status client-side
                if (status === 'verified') {
                    documents = documents.filter(d => d.is_verified);
                } else if (status === 'pending') {
                    documents = documents.filter(d => !d.is_verified);
                }
                
                renderDocuments(documents);
            } catch (err) {
                console.error('Error loading documents:', err);
            }
        }
        
        // Render documents table
        function renderDocuments(documents) {
            const tbody = document.getElementById('documentsTable');
            
            if (documents.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                                    <rect x="9" y="3" width="6" height="4" rx="2"/>
                                </svg>
                                <p>No records found</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = documents.map(doc => `
                <tr>
                    <td><strong>${doc.document_number}</strong></td>
                    <td>${new Date(doc.log_date).toLocaleDateString()}</td>
                    <td>${doc.branch_name}</td>
                    <td>${doc.product_text}</td>
                    <td>${doc.filled_by}</td>
                    <td>
                        <span class="status-badge ${doc.is_verified ? 'status-verified' : 'status-pending'}">
                            ${doc.is_verified ? '✓ Verified' : 'Pending'}
                        </span>
                    </td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-primary" onclick="viewDocument(${doc.id})">View</button>
                            ${!doc.is_verified ? `<button class="btn btn-sm btn-success" onclick="verifyDocument(${doc.id})">Verify</button>` : ''}
                            <button class="btn btn-sm btn-danger" onclick="deleteDocument(${doc.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        
        // View document details
        async function viewDocument(id) {
            try {
                const response = await fetch(`/end-product-checklist/api/documents/${id}`);
                const doc = await response.json();
                
                const formatResult = (value, action) => {
                    if (value === null || value === undefined) return '<span class="result-na">N/A</span>';
                    const result = value ? '<span class="result-yes">Yes</span>' : '<span class="result-no">No</span>';
                    const corrective = (!value && action) ? `<span class="corrective-note">${action}</span>` : '';
                    return result + corrective;
                };
                
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="detail-section">
                        <h4>📋 Basic Information</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>Document Number</label>
                                <span>${doc.document_number}</span>
                            </div>
                            <div class="detail-item">
                                <label>Date</label>
                                <span>${new Date(doc.log_date).toLocaleDateString()}</span>
                            </div>
                            <div class="detail-item">
                                <label>Branch</label>
                                <span>${doc.branch_name}</span>
                            </div>
                            <div class="detail-item">
                                <label>Product</label>
                                <span>${doc.product_text}</span>
                            </div>
                            <div class="detail-item">
                                <label>Filled By</label>
                                <span>${doc.filled_by}</span>
                            </div>
                            <div class="detail-item">
                                <label>Status</label>
                                <span class="status-badge ${doc.is_verified ? 'status-verified' : 'status-pending'}">
                                    ${doc.is_verified ? '✓ Verified' : 'Pending'}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>🥩 Raw Material</h4>
                        <div class="checklist-result">
                            <span>Appearance is Good</span>
                            ${formatResult(doc.raw_appearance_good, doc.raw_appearance_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Temperature OK</span>
                            ${formatResult(doc.raw_temperature_ok, doc.raw_temperature_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Production Date</span>
                            <span>${doc.raw_production_date ? new Date(doc.raw_production_date).toLocaleDateString() : 'N/A'}</span>
                        </div>
                        <div class="checklist-result">
                            <span>Expiry Date</span>
                            <span>${doc.raw_expiry_date ? new Date(doc.raw_expiry_date).toLocaleDateString() : 'N/A'}</span>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>👁️ Visual Inspection</h4>
                        <div class="checklist-result">
                            <span>Work Area Cleanliness</span>
                            ${formatResult(doc.visual_work_area_clean, doc.visual_work_area_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Proper Food Handling</span>
                            ${formatResult(doc.visual_food_handling, doc.visual_food_handling_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Ingredients Appearance</span>
                            ${formatResult(doc.visual_ingredients_appearance, doc.visual_ingredients_action)}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>⚖️ Food Portion</h4>
                        <div class="checklist-result">
                            <span>Correct Weight Applied</span>
                            ${formatResult(doc.food_correct_weight, doc.food_correct_weight_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Cutleries Present</span>
                            ${formatResult(doc.food_cutleries_present, doc.food_cutleries_action)}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>📦 Packaging</h4>
                        <div class="checklist-result">
                            <span>Correct Packaging Used</span>
                            ${formatResult(doc.pkg_correct_packaging, doc.pkg_correct_packaging_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Packaging Clean</span>
                            ${formatResult(doc.pkg_clean, doc.pkg_clean_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Correct Label/Sticker</span>
                            ${formatResult(doc.pkg_correct_label, doc.pkg_correct_label_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Correct Shelf Life</span>
                            ${formatResult(doc.pkg_correct_shelf_life, doc.pkg_correct_shelf_life_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Sealed Properly</span>
                            ${formatResult(doc.pkg_sealed_properly, doc.pkg_sealed_properly_action)}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>🎯 End Product</h4>
                        <div class="checklist-result">
                            <span>Overall Presentation</span>
                            ${formatResult(doc.end_overall_presentation, doc.end_overall_presentation_action)}
                        </div>
                        <div class="checklist-result">
                            <span>Tasting</span>
                            ${formatResult(doc.end_tasting, doc.end_tasting_action)}
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>🔒 Retention</h4>
                        <div class="checklist-result">
                            <span>Retention Taken</span>
                            <span class="${doc.retention_taken ? 'result-yes' : 'result-no'}">${doc.retention_taken ? 'Yes' : 'No'}</span>
                        </div>
                    </div>
                    
                    ${doc.comments ? `
                    <div class="detail-section">
                        <h4>💬 Comments</h4>
                        <p>${doc.comments}</p>
                    </div>
                    ` : ''}
                    
                    ${doc.is_verified ? `
                    <div class="detail-section">
                        <h4>✓ Verification</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>Verified By</label>
                                <span>${doc.verified_by}</span>
                            </div>
                            <div class="detail-item">
                                <label>Verified At</label>
                                <span>${new Date(doc.verified_at).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                    ` : ''}
                `;
                
                document.getElementById('viewModal').classList.add('show');
            } catch (err) {
                console.error('Error loading document:', err);
            }
        }
        
        // Close modal
        function closeModal() {
            document.getElementById('viewModal').classList.remove('show');
        }
        
        // Verify document
        async function verifyDocument(id) {
            if (!confirm('Are you sure you want to verify this checklist?')) return;
            
            try {
                const response = await fetch(`/end-product-checklist/api/documents/${id}/verify`, {
                    method: 'PUT'
                });
                
                if (response.ok) {
                    loadDocuments();
                }
            } catch (err) {
                console.error('Error verifying document:', err);
            }
        }
        
        // Delete document
        async function deleteDocument(id) {
            if (!confirm('Are you sure you want to delete this checklist? This action cannot be undone.')) return;
            
            try {
                const response = await fetch(`/end-product-checklist/api/documents/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadDocuments();
                }
            } catch (err) {
                console.error('Error deleting document:', err);
            }
        }
        
        // Close modal on outside click
        document.getElementById('viewModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });
        
        // Set default date range (last 30 days)
        function setDefaultDateRange() {
            const today = new Date();
            const thirtyDaysAgo = new Date(today);
            thirtyDaysAgo.setDate(today.getDate() - 30);
            
            document.getElementById('filterTo').value = today.toISOString().split('T')[0];
            document.getElementById('filterFrom').value = thirtyDaysAgo.toISOString().split('T')[0];
        }
        
        // Initialize
        loadBranches();
        setDefaultDateRange();
        loadDocuments();
    </script>
</body>
</html>
