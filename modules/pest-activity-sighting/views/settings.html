<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pest Activity Settings - FS Monitoring</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #dc2626 0%, #ef4444 100%);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(220, 38, 38, 0.3);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: white; color: #dc2626; }
        .btn-primary:hover { background: #fef2f2; }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            background: white;
            border: none;
            border-radius: 8px 8px 0 0;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #dc2626;
            color: white;
        }
        
        .tab:hover:not(.active) {
            background: #f9fafb;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .card-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
        }
        
        .settings-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group input, .form-group select {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #dc2626;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        
        th {
            background: #f9fafb;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #6b7280;
        }
        
        td { font-size: 0.875rem; color: #374151; }
        
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9fafb; }
        
        .actions-cell { white-space: nowrap; }
        .actions-cell button { margin-right: 0.25rem; }
        
        .badge {
            display: inline-block;
            padding: 0.25rem 0.625rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .badge-active { background: #d1fae5; color: #065f46; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #6b7280;
        }
        
        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }
        
        .modal-backdrop.active { display: flex; }
        
        .modal {
            background: white;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
        }
        
        .modal-header {
            padding: 1.25rem;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 { font-size: 1.125rem; font-weight: 600; }
        
        .modal-close {
            background: #f3f4f6;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.25rem;
        }
        
        .modal-body { padding: 1.5rem; }
        
        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .tabs { flex-wrap: wrap; }
            .settings-form { grid-template-columns: 1fr; }
            th, td { padding: 0.5rem; font-size: 0.8125rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>⚙️ Pest Activity Settings / إعدادات رصد الآفات</h1>
            <div class="header-actions">
                <a href="/pest-activity-sighting" class="btn btn-secondary">← Back</a>
                <a href="/dashboard" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div id="alertContainer"></div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('general')">📋 General</button>
            <button class="tab" onclick="switchTab('pest-types')">🐛 Pest Types</button>
            <button class="tab" onclick="switchTab('locations')">📍 Locations</button>
        </div>
        
        <!-- General Settings Tab -->
        <div id="tab-general" class="tab-content active">
            <div class="card">
                <div class="card-header">
                    <h2>General Settings / الإعدادات العامة</h2>
                </div>
                
                <form id="settingsForm" class="settings-form">
                    <div class="form-group">
                        <label>Company Name / اسم الشركة</label>
                        <input type="text" id="company_name" name="company_name" placeholder="Enter company name">
                    </div>
                    <div class="form-group">
                        <label>Reference No. / المرجع</label>
                        <input type="text" id="reference" name="reference" placeholder="e.g., PAS-001">
                    </div>
                    <div class="form-group">
                        <label>Edition / الإصدار</label>
                        <input type="text" id="edition" name="edition" placeholder="e.g., 1.0">
                    </div>
                    <div class="form-group">
                        <label>Creation Date / تاريخ الإنشاء</label>
                        <input type="date" id="creation_date" name="creation_date">
                    </div>
                    <div class="form-group">
                        <label>Last Revision Date / تاريخ المراجعة</label>
                        <input type="date" id="last_revision_date" name="last_revision_date">
                    </div>
                </form>
                
                <div style="display: flex; justify-content: flex-end;">
                    <button class="btn btn-success" onclick="saveSettings()">💾 Save Settings</button>
                </div>
            </div>
        </div>
        
        <!-- Pest Types Tab -->
        <div id="tab-pest-types" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2>Pest Types / أنواع الآفات</h2>
                    <button class="btn btn-success btn-sm" onclick="openPestTypeModal()">+ Add Pest Type</button>
                </div>
                
                <div class="table-container">
                    <table id="pestTypesTable">
                        <thead>
                            <tr>
                                <th>English Name</th>
                                <th>Arabic Name / الاسم</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- Locations Tab -->
        <div id="tab-locations" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2>Locations / المواقع</h2>
                    <button class="btn btn-success btn-sm" onclick="openLocationModal()">+ Add Location</button>
                </div>
                
                <div class="table-container">
                    <table id="locationsTable">
                        <thead>
                            <tr>
                                <th>English Name</th>
                                <th>Arabic Name / الاسم</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Pest Type Modal -->
    <div class="modal-backdrop" id="pestTypeModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="pestTypeModalTitle">Add Pest Type</h2>
                <button class="modal-close" onclick="closePestTypeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="pestTypeForm">
                    <input type="hidden" id="pest_type_id">
                    <div class="form-group">
                        <label>English Name *</label>
                        <input type="text" id="pest_type_en" required placeholder="e.g., Cockroach">
                    </div>
                    <div class="form-group">
                        <label>Arabic Name / الاسم بالعربي</label>
                        <input type="text" id="pest_type_ar" placeholder="مثال: صرصور" dir="rtl">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="pest_type_active">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePestTypeModal()">Cancel</button>
                <button class="btn btn-success" onclick="savePestType()">Save</button>
            </div>
        </div>
    </div>
    
    <!-- Location Modal -->
    <div class="modal-backdrop" id="locationModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="locationModalTitle">Add Location</h2>
                <button class="modal-close" onclick="closeLocationModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="locationForm">
                    <input type="hidden" id="location_id">
                    <div class="form-group">
                        <label>English Name *</label>
                        <input type="text" id="location_en" required placeholder="e.g., Kitchen">
                    </div>
                    <div class="form-group">
                        <label>Arabic Name / الاسم بالعربي</label>
                        <input type="text" id="location_ar" placeholder="مثال: المطبخ" dir="rtl">
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="location_active">
                            <option value="1">Active</option>
                            <option value="0">Inactive</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeLocationModal()">Cancel</button>
                <button class="btn btn-success" onclick="saveLocation()">Save</button>
            </div>
        </div>
    </div>
    
    <script>
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.querySelector(`.tab[onclick*="${tabName}"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }
        
        // General Settings
        async function loadSettings() {
            try {
                const response = await fetch('/pest-activity-sighting/api/settings');
                const settings = await response.json();
                
                if (settings) {
                    document.getElementById('company_name').value = settings.company_name || '';
                    document.getElementById('reference').value = settings.reference || '';
                    document.getElementById('edition').value = settings.edition || '';
                    document.getElementById('creation_date').value = settings.creation_date ? 
                        settings.creation_date.split('T')[0] : '';
                    document.getElementById('last_revision_date').value = settings.last_revision_date ? 
                        settings.last_revision_date.split('T')[0] : '';
                }
            } catch (err) {
                console.error('Error loading settings:', err);
            }
        }
        
        async function saveSettings() {
            const data = {
                company_name: document.getElementById('company_name').value,
                reference: document.getElementById('reference').value,
                edition: document.getElementById('edition').value,
                creation_date: document.getElementById('creation_date').value || null,
                last_revision_date: document.getElementById('last_revision_date').value || null
            };
            
            try {
                const response = await fetch('/pest-activity-sighting/api/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showAlert('Settings saved successfully!', 'success');
                } else {
                    showAlert('Failed to save settings', 'error');
                }
            } catch (err) {
                console.error('Error saving settings:', err);
                showAlert('Failed to save settings', 'error');
            }
        }
        
        // Pest Types
        async function loadPestTypes() {
            try {
                const response = await fetch('/pest-activity-sighting/api/pest-types?includeInactive=true');
                const types = await response.json();
                
                const tbody = document.querySelector('#pestTypesTable tbody');
                
                if (!types || types.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No pest types configured</td></tr>';
                    return;
                }
                
                tbody.innerHTML = types.map(type => `
                    <tr>
                        <td>${type.pest_type_en || ''}</td>
                        <td dir="rtl">${type.pest_type_ar || ''}</td>
                        <td>
                            <span class="badge ${type.is_active ? 'badge-active' : 'badge-inactive'}">
                                ${type.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="actions-cell">
                            <button class="btn btn-secondary btn-sm" onclick="editPestType(${type.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePestType(${type.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Error loading pest types:', err);
            }
        }
        
        function openPestTypeModal(type = null) {
            document.getElementById('pestTypeModalTitle').textContent = type ? 'Edit Pest Type' : 'Add Pest Type';
            document.getElementById('pest_type_id').value = type?.id || '';
            document.getElementById('pest_type_en').value = type?.pest_type_en || '';
            document.getElementById('pest_type_ar').value = type?.pest_type_ar || '';
            document.getElementById('pest_type_active').value = type?.is_active !== false ? '1' : '0';
            document.getElementById('pestTypeModal').classList.add('active');
        }
        
        function closePestTypeModal() {
            document.getElementById('pestTypeModal').classList.remove('active');
            document.getElementById('pestTypeForm').reset();
        }
        
        async function editPestType(id) {
            try {
                const response = await fetch('/pest-activity-sighting/api/pest-types?includeInactive=true');
                const types = await response.json();
                const type = types.find(t => t.id === id);
                if (type) openPestTypeModal(type);
            } catch (err) {
                console.error('Error loading pest type:', err);
            }
        }
        
        async function savePestType() {
            const id = document.getElementById('pest_type_id').value;
            const data = {
                pest_type_en: document.getElementById('pest_type_en').value,
                pest_type_ar: document.getElementById('pest_type_ar').value,
                is_active: document.getElementById('pest_type_active').value === '1'
            };
            
            if (!data.pest_type_en) {
                showAlert('English name is required', 'error');
                return;
            }
            
            try {
                const url = id ? `/pest-activity-sighting/api/pest-types/${id}` : '/pest-activity-sighting/api/pest-types';
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showAlert('Pest type saved successfully!', 'success');
                    closePestTypeModal();
                    loadPestTypes();
                } else {
                    showAlert('Failed to save pest type', 'error');
                }
            } catch (err) {
                console.error('Error saving pest type:', err);
                showAlert('Failed to save pest type', 'error');
            }
        }
        
        async function deletePestType(id) {
            if (!confirm('Are you sure you want to delete this pest type?')) return;
            
            try {
                const response = await fetch(`/pest-activity-sighting/api/pest-types/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showAlert('Pest type deleted successfully!', 'success');
                    loadPestTypes();
                } else {
                    showAlert('Failed to delete pest type', 'error');
                }
            } catch (err) {
                console.error('Error deleting pest type:', err);
                showAlert('Failed to delete pest type', 'error');
            }
        }
        
        // Locations
        async function loadLocations() {
            try {
                const response = await fetch('/pest-activity-sighting/api/locations?includeInactive=true');
                const locations = await response.json();
                
                const tbody = document.querySelector('#locationsTable tbody');
                
                if (!locations || locations.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No locations configured</td></tr>';
                    return;
                }
                
                tbody.innerHTML = locations.map(loc => `
                    <tr>
                        <td>${loc.location_en || ''}</td>
                        <td dir="rtl">${loc.location_ar || ''}</td>
                        <td>
                            <span class="badge ${loc.is_active ? 'badge-active' : 'badge-inactive'}">
                                ${loc.is_active ? 'Active' : 'Inactive'}
                            </span>
                        </td>
                        <td class="actions-cell">
                            <button class="btn btn-secondary btn-sm" onclick="editLocation(${loc.id})">Edit</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteLocation(${loc.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error('Error loading locations:', err);
            }
        }
        
        function openLocationModal(loc = null) {
            document.getElementById('locationModalTitle').textContent = loc ? 'Edit Location' : 'Add Location';
            document.getElementById('location_id').value = loc?.id || '';
            document.getElementById('location_en').value = loc?.location_en || '';
            document.getElementById('location_ar').value = loc?.location_ar || '';
            document.getElementById('location_active').value = loc?.is_active !== false ? '1' : '0';
            document.getElementById('locationModal').classList.add('active');
        }
        
        function closeLocationModal() {
            document.getElementById('locationModal').classList.remove('active');
            document.getElementById('locationForm').reset();
        }
        
        async function editLocation(id) {
            try {
                const response = await fetch('/pest-activity-sighting/api/locations?includeInactive=true');
                const locations = await response.json();
                const loc = locations.find(l => l.id === id);
                if (loc) openLocationModal(loc);
            } catch (err) {
                console.error('Error loading location:', err);
            }
        }
        
        async function saveLocation() {
            const id = document.getElementById('location_id').value;
            const data = {
                location_en: document.getElementById('location_en').value,
                location_ar: document.getElementById('location_ar').value,
                is_active: document.getElementById('location_active').value === '1'
            };
            
            if (!data.location_en) {
                showAlert('English name is required', 'error');
                return;
            }
            
            try {
                const url = id ? `/pest-activity-sighting/api/locations/${id}` : '/pest-activity-sighting/api/locations';
                const method = id ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showAlert('Location saved successfully!', 'success');
                    closeLocationModal();
                    loadLocations();
                } else {
                    showAlert('Failed to save location', 'error');
                }
            } catch (err) {
                console.error('Error saving location:', err);
                showAlert('Failed to save location', 'error');
            }
        }
        
        async function deleteLocation(id) {
            if (!confirm('Are you sure you want to delete this location?')) return;
            
            try {
                const response = await fetch(`/pest-activity-sighting/api/locations/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showAlert('Location deleted successfully!', 'success');
                    loadLocations();
                } else {
                    showAlert('Failed to delete location', 'error');
                }
            } catch (err) {
                console.error('Error deleting location:', err);
                showAlert('Failed to delete location', 'error');
            }
        }
        
        // Close modals on backdrop click
        document.querySelectorAll('.modal-backdrop').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-backdrop')) {
                    modal.classList.remove('active');
                }
            });
        });
        
        // Initialize
        loadSettings();
        loadPestTypes();
        loadLocations();
    </script>
</body>
</html>
