<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Trucks Dispatching Form - FS Monitoring</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        
        .header-content {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: white; color: #6366f1; }
        .btn-primary:hover { background: #eef2ff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-lg { padding: 0.875rem 2rem; font-size: 1rem; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .card-header h2 {
            font-size: 1.125rem;
            font-weight: 600;
            color: #1f2937;
        }
        
        .card-header .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #eef2ff, #e0e7ff);
            color: #6366f1;
        }
        
        .card-header .icon svg { width: 20px; height: 20px; }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: #374151;
        }
        
        .form-group label.required::after {
            content: '*';
            color: #ef4444;
            margin-left: 0.25rem;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
            width: 100%;
        }
        
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-group label {
            font-size: 0.9rem;
            color: #374151;
            cursor: pointer;
            flex: 1;
        }
        
        .yes-no-group {
            display: flex;
            gap: 1rem;
        }
        
        .yes-no-option {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .yes-no-option:hover { border-color: #6366f1; }
        
        .yes-no-option input { display: none; }
        
        .yes-no-option.selected.yes { border-color: #10b981; background: #d1fae5; }
        .yes-no-option.selected.no { border-color: #ef4444; background: #fee2e2; }
        
        .corrective-action-container {
            display: none;
            margin-top: 0.75rem;
            padding: 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
        }
        
        .corrective-action-container.show { display: block; }
        
        .corrective-action-container label {
            color: #991b1b;
            font-weight: 500;
            display: block;
            margin-bottom: 0.5rem;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            margin-top: 1rem;
        }
        
        .alert { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
        .alert-success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .temp-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .temp-input-wrapper {
            position: relative;
        }
        
        .temp-input-wrapper input {
            padding-right: 2.5rem;
        }
        
        .temp-unit {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #6b7280;
            font-size: 0.875rem;
        }
        
        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .form-row, .temp-row { grid-template-columns: 1fr; }
            .yes-no-group { flex-direction: column; }
            .form-actions { flex-direction: column; }
            .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📋 Dispatching Monitoring Form</h1>
            <div class="header-actions">
                <a href="/trucks-dispatching" class="btn btn-secondary">← Back</a>
                <a href="/dashboard" class="btn btn-secondary">🏠 Dashboard</a>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div id="alertContainer"></div>
        
        <form id="dispatchingForm">
            <!-- Basic Information -->
            <div class="card">
                <div class="card-header">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="8.5" cy="7" r="4"/>
                            <line x1="20" y1="8" x2="20" y2="14"/>
                            <line x1="23" y1="11" x2="17" y2="11"/>
                        </svg>
                    </div>
                    <h2>Basic Information</h2>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="filled_by" class="required">Filled By</label>
                        <input type="text" id="filled_by" name="filled_by" required placeholder="Enter name">
                    </div>
                    <div class="form-group">
                        <label for="document_date" class="required">Date</label>
                        <input type="date" id="document_date" name="document_date" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="truck_id" class="required">Truck Number</label>
                    <select id="truck_id" name="truck_id" required>
                        <option value="">Select Truck</option>
                    </select>
                </div>
            </div>
            
            <!-- Temperature Section -->
            <div class="card">
                <div class="card-header">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
                        </svg>
                    </div>
                    <h2>Temperature Monitoring</h2>
                </div>
                
                <div class="temp-row">
                    <div class="form-group">
                        <label for="set_temperature">Truck Set Temperature</label>
                        <div class="temp-input-wrapper">
                            <input type="number" id="set_temperature" name="set_temperature" step="0.1" placeholder="e.g., -18">
                            <span class="temp-unit">°C</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="actual_temperature">Truck Actual Temperature</label>
                        <div class="temp-input-wrapper">
                            <input type="number" id="actual_temperature" name="actual_temperature" step="0.1" placeholder="e.g., -16">
                            <span class="temp-unit">°C</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Cleanliness & Segregation -->
            <div class="card">
                <div class="card-header">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <h2>Inspection Checklist</h2>
                </div>
                
                <!-- Truck Cleanliness -->
                <div class="form-group">
                    <label class="required">Truck Cleanliness</label>
                    <div class="yes-no-group">
                        <label class="yes-no-option yes" onclick="selectYesNo(this, 'truck_cleanliness', true)">
                            <input type="radio" name="truck_cleanliness" value="1">
                            ✓ Yes
                        </label>
                        <label class="yes-no-option no" onclick="selectYesNo(this, 'truck_cleanliness', false)">
                            <input type="radio" name="truck_cleanliness" value="0">
                            ✗ No
                        </label>
                    </div>
                    <div class="corrective-action-container" id="cleanliness_corrective_container">
                        <label for="cleanliness_corrective_action">⚠️ Corrective Action Required</label>
                        <textarea id="cleanliness_corrective_action" name="cleanliness_corrective_action" placeholder="Describe the corrective action taken..."></textarea>
                    </div>
                </div>
                
                <!-- Raw/RTE Segregation -->
                <div class="form-group">
                    <label>Good segregation between Raw and RTE products</label>
                    <div class="yes-no-group">
                        <label class="yes-no-option yes" onclick="selectYesNo(this, 'raw_rte_segregation', true)">
                            <input type="radio" name="raw_rte_segregation" value="1">
                            ✓ Yes
                        </label>
                        <label class="yes-no-option no" onclick="selectYesNo(this, 'raw_rte_segregation', false)">
                            <input type="radio" name="raw_rte_segregation" value="0">
                            ✗ No
                        </label>
                    </div>
                </div>
                
                <!-- Meat/Chicken Segregation -->
                <div class="form-group">
                    <label>Segregation between meat and chicken shawarma skewers</label>
                    <div class="yes-no-group">
                        <label class="yes-no-option yes" onclick="selectYesNo(this, 'meat_chicken_segregation', true)">
                            <input type="radio" name="meat_chicken_segregation" value="1">
                            ✓ Yes
                        </label>
                        <label class="yes-no-option no" onclick="selectYesNo(this, 'meat_chicken_segregation', false)">
                            <input type="radio" name="meat_chicken_segregation" value="0">
                            ✗ No
                        </label>
                    </div>
                </div>
                
                <!-- Products Arranged -->
                <div class="form-group">
                    <label>Products arranged in a way to prevent shifting or crushing</label>
                    <div class="yes-no-group">
                        <label class="yes-no-option yes" onclick="selectYesNo(this, 'products_arranged', true)">
                            <input type="radio" name="products_arranged" value="1">
                            ✓ Yes
                        </label>
                        <label class="yes-no-option no" onclick="selectYesNo(this, 'products_arranged', false)">
                            <input type="radio" name="products_arranged" value="0">
                            ✗ No
                        </label>
                    </div>
                </div>
            </div>
            
            <!-- Comments -->
            <div class="card">
                <div class="card-header">
                    <div class="icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <h2>Comments</h2>
                </div>
                
                <div class="form-group">
                    <label for="comments">Additional Comments</label>
                    <textarea id="comments" name="comments" placeholder="Enter any additional comments or observations..."></textarea>
                </div>
                
                <div class="form-actions">
                    <a href="/trucks-dispatching" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-success btn-lg">💾 Save Record</button>
                </div>
            </div>
        </form>
    </div>
    
    <script>
        // Set today's date as default
        document.getElementById('document_date').value = new Date().toISOString().split('T')[0];
        
        // Load user's name from session
        const userName = sessionStorage.getItem('userName');
        if (userName) {
            document.getElementById('filled_by').value = userName;
        }
        
        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            container.scrollIntoView({ behavior: 'smooth' });
            setTimeout(() => container.innerHTML = '', 5000);
        }
        
        function selectYesNo(element, fieldName, isYes) {
            // Remove selected class from siblings
            const parent = element.parentElement;
            parent.querySelectorAll('.yes-no-option').forEach(opt => opt.classList.remove('selected'));
            
            // Add selected class to clicked element
            element.classList.add('selected');
            
            // Check the radio button
            element.querySelector('input').checked = true;
            
            // Handle corrective action for cleanliness
            if (fieldName === 'truck_cleanliness') {
                const container = document.getElementById('cleanliness_corrective_container');
                if (!isYes) {
                    container.classList.add('show');
                } else {
                    container.classList.remove('show');
                    document.getElementById('cleanliness_corrective_action').value = '';
                }
            }
        }
        
        async function loadTrucks() {
            try {
                const response = await fetch('/trucks-dispatching/api/trucks');
                const trucks = await response.json();
                const select = document.getElementById('truck_id');
                
                trucks.forEach(truck => {
                    const option = document.createElement('option');
                    option.value = truck.id;
                    option.textContent = truck.truck_number + (truck.truck_code ? ` (${truck.truck_code})` : '');
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading trucks:', err);
            }
        }
        
        document.getElementById('dispatchingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                filled_by: formData.get('filled_by'),
                document_date: formData.get('document_date'),
                truck_id: parseInt(formData.get('truck_id')),
                set_temperature: formData.get('set_temperature') ? parseFloat(formData.get('set_temperature')) : null,
                actual_temperature: formData.get('actual_temperature') ? parseFloat(formData.get('actual_temperature')) : null,
                truck_cleanliness: formData.get('truck_cleanliness') === '1',
                cleanliness_corrective_action: formData.get('cleanliness_corrective_action') || null,
                raw_rte_segregation: formData.get('raw_rte_segregation') === '1',
                meat_chicken_segregation: formData.get('meat_chicken_segregation') === '1',
                products_arranged: formData.get('products_arranged') === '1',
                comments: formData.get('comments') || null,
                branch_id: sessionStorage.getItem('branchId') ? parseInt(sessionStorage.getItem('branchId')) : null
            };
            
            // Validation
            if (!data.filled_by || !data.document_date || !data.truck_id) {
                showAlert('Please fill in all required fields', 'error');
                return;
            }
            
            try {
                const response = await fetch('/trucks-dispatching/api/documents', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showAlert('Record saved successfully!', 'success');
                    setTimeout(() => {
                        window.location.href = '/trucks-dispatching';
                    }, 1500);
                } else {
                    const error = await response.json();
                    showAlert(error.error || 'Failed to save record', 'error');
                }
            } catch (err) {
                console.error('Error saving record:', err);
                showAlert('Failed to save record. Please try again.', 'error');
            }
        });
        
        loadTrucks();
    </script>
</body>
</html>
