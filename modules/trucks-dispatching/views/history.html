<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Dispatching History - FS Monitoring</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: white;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .header h1 { font-size: 1.5rem; font-weight: 700; }
        .header-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        
        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
            border: none;
        }
        
        .btn-primary { background: white; color: #6366f1; }
        .btn-primary:hover { background: #eef2ff; }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-sm { padding: 0.375rem 0.75rem; font-size: 0.75rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 1.5rem;
        }
        
        .filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-group label { font-size: 0.875rem; color: #6b7280; font-weight: 500; }
        
        .filter-group input, .filter-group select {
            padding: 0.625rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        
        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .records-list { display: flex; flex-direction: column; gap: 1rem; }
        
        .record-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .record-card:hover {
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .record-title { font-weight: 600; color: #1f2937; font-size: 1rem; }
        .record-date { font-size: 0.875rem; color: #6b7280; }
        .record-truck { font-size: 0.875rem; color: #6366f1; font-weight: 500; }
        
        .record-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        
        .detail-item { display: flex; flex-direction: column; gap: 0.25rem; }
        .detail-label { font-size: 0.75rem; color: #9ca3af; text-transform: uppercase; }
        .detail-value { font-size: 0.875rem; color: #1f2937; }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-badge.pass { background: #d1fae5; color: #065f46; }
        .status-badge.fail { background: #fee2e2; color: #991b1b; }
        
        .record-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
        
        .empty-state { text-align: center; padding: 3rem; color: #6b7280; }
        .empty-state svg { width: 64px; height: 64px; margin-bottom: 1rem; opacity: 0.5; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .modal.show { display: flex; }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .modal-header h3 { font-size: 1.125rem; font-weight: 600; }
        
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
        }
        
        .modal-body { padding: 1.25rem; }
        
        .modal-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .modal-row:last-child { border-bottom: none; }
        .modal-label { color: #6b7280; }
        .modal-value { font-weight: 500; color: #1f2937; }
        
        .modal-section {
            background: #f9fafb;
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }
        
        .modal-section h4 {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.75rem;
        }
        
        @media (max-width: 640px) {
            .header-content { flex-direction: column; text-align: center; }
            .filters { grid-template-columns: 1fr; }
            .record-details { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>📜 Dispatching History</h1>
            <div class="header-actions">
                <a href="/trucks-dispatching" class="btn btn-secondary">← Back</a>
                <a href="/trucks-dispatching/form" class="btn btn-primary">+ New Record</a>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="card">
            <div class="filters">
                <div class="filter-group">
                    <label>Start Date</label>
                    <input type="date" id="startDate">
                </div>
                <div class="filter-group">
                    <label>End Date</label>
                    <input type="date" id="endDate">
                </div>
                <div class="filter-group">
                    <label>Truck</label>
                    <select id="truckFilter">
                        <option value="">All Trucks</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>&nbsp;</label>
                    <button class="btn btn-primary" onclick="loadRecords()">🔍 Search</button>
                </div>
            </div>
        </div>
        
        <div class="records-list" id="recordsList">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <p>Loading records...</p>
            </div>
        </div>
    </div>
    
    <!-- View Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 Record Details</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content loaded dynamically -->
            </div>
        </div>
    </div>
    
    <script>
        // Set default date range (last 30 days)
        const today = new Date();
        const thirtyDaysAgo = new Date(today.getTime() - 30 * 24 * 60 * 60 * 1000);
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];
        
        async function loadTrucks() {
            try {
                const response = await fetch('/trucks-dispatching/api/trucks');
                const trucks = await response.json();
                const select = document.getElementById('truckFilter');
                
                trucks.forEach(truck => {
                    const option = document.createElement('option');
                    option.value = truck.id;
                    option.textContent = truck.truck_number;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error('Error loading trucks:', err);
            }
        }
        
        async function loadRecords() {
            const container = document.getElementById('recordsList');
            container.innerHTML = '<div class="empty-state"><p>Loading...</p></div>';
            
            try {
                const params = new URLSearchParams();
                const startDate = document.getElementById('startDate').value;
                const endDate = document.getElementById('endDate').value;
                const truckId = document.getElementById('truckFilter').value;
                const branchId = sessionStorage.getItem('branchId');
                
                if (startDate) params.append('startDate', startDate);
                if (endDate) params.append('endDate', endDate);
                if (truckId) params.append('truck_id', truckId);
                if (branchId) params.append('branch_id', branchId);
                
                const response = await fetch(`/trucks-dispatching/api/documents?${params}`);
                const records = await response.json();
                
                if (records.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"/>
                                <line x1="8" y1="12" x2="16" y2="12"/>
                            </svg>
                            <p>No records found for the selected criteria</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = records.map(record => `
                    <div class="record-card" onclick="viewRecord(${record.id})">
                        <div class="record-header">
                            <div>
                                <div class="record-title">${record.filled_by}</div>
                                <div class="record-truck">🚚 ${record.truck_number || 'Unknown Truck'}</div>
                            </div>
                            <div class="record-date">${new Date(record.document_date).toLocaleDateString()}</div>
                        </div>
                        <div class="record-details">
                            <div class="detail-item">
                                <span class="detail-label">Set Temp</span>
                                <span class="detail-value">${record.set_temperature !== null ? record.set_temperature + '°C' : '-'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Actual Temp</span>
                                <span class="detail-value">${record.actual_temperature !== null ? record.actual_temperature + '°C' : '-'}</span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Cleanliness</span>
                                <span class="status-badge ${record.truck_cleanliness ? 'pass' : 'fail'}">
                                    ${record.truck_cleanliness ? '✓ Clean' : '✗ Issue'}
                                </span>
                            </div>
                            <div class="detail-item">
                                <span class="detail-label">Segregation</span>
                                <span class="status-badge ${record.raw_rte_segregation ? 'pass' : 'fail'}">
                                    ${record.raw_rte_segregation ? '✓ OK' : '✗ Issue'}
                                </span>
                            </div>
                        </div>
                        <div class="record-actions">
                            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation(); viewRecord(${record.id})">View</button>
                            <button class="btn btn-sm btn-danger admin-only" style="display: none;" onclick="event.stopPropagation(); deleteRecord(${record.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
                
                // Show delete button for admins
                const userRole = sessionStorage.getItem('userRole');
                if (userRole === 'admin' || userRole === 'superadmin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'inline-flex');
                }
            } catch (err) {
                console.error('Error loading records:', err);
                container.innerHTML = '<div class="empty-state"><p>Error loading records</p></div>';
            }
        }
        
        async function viewRecord(id) {
            try {
                const response = await fetch(`/trucks-dispatching/api/documents/${id}`);
                const record = await response.json();
                
                const modalBody = document.getElementById('modalBody');
                modalBody.innerHTML = `
                    <div class="modal-row">
                        <span class="modal-label">Filled By</span>
                        <span class="modal-value">${record.filled_by}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-label">Date</span>
                        <span class="modal-value">${new Date(record.document_date).toLocaleDateString()}</span>
                    </div>
                    <div class="modal-row">
                        <span class="modal-label">Truck</span>
                        <span class="modal-value">${record.truck_number || 'Unknown'} ${record.truck_code ? '(' + record.truck_code + ')' : ''}</span>
                    </div>
                    
                    <div class="modal-section">
                        <h4>🌡️ Temperature</h4>
                        <div class="modal-row">
                            <span class="modal-label">Set Temperature</span>
                            <span class="modal-value">${record.set_temperature !== null ? record.set_temperature + '°C' : 'Not recorded'}</span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">Actual Temperature</span>
                            <span class="modal-value">${record.actual_temperature !== null ? record.actual_temperature + '°C' : 'Not recorded'}</span>
                        </div>
                    </div>
                    
                    <div class="modal-section">
                        <h4>✅ Inspection Results</h4>
                        <div class="modal-row">
                            <span class="modal-label">Truck Cleanliness</span>
                            <span class="status-badge ${record.truck_cleanliness ? 'pass' : 'fail'}">
                                ${record.truck_cleanliness ? '✓ Yes' : '✗ No'}
                            </span>
                        </div>
                        ${!record.truck_cleanliness && record.cleanliness_corrective_action ? `
                            <div class="modal-row">
                                <span class="modal-label">Corrective Action</span>
                                <span class="modal-value">${record.cleanliness_corrective_action}</span>
                            </div>
                        ` : ''}
                        <div class="modal-row">
                            <span class="modal-label">Raw/RTE Segregation</span>
                            <span class="status-badge ${record.raw_rte_segregation ? 'pass' : 'fail'}">
                                ${record.raw_rte_segregation ? '✓ Yes' : '✗ No'}
                            </span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">Meat/Chicken Segregation</span>
                            <span class="status-badge ${record.meat_chicken_segregation ? 'pass' : 'fail'}">
                                ${record.meat_chicken_segregation ? '✓ Yes' : '✗ No'}
                            </span>
                        </div>
                        <div class="modal-row">
                            <span class="modal-label">Products Arranged</span>
                            <span class="status-badge ${record.products_arranged ? 'pass' : 'fail'}">
                                ${record.products_arranged ? '✓ Yes' : '✗ No'}
                            </span>
                        </div>
                    </div>
                    
                    ${record.comments ? `
                        <div class="modal-section">
                            <h4>💬 Comments</h4>
                            <p>${record.comments}</p>
                        </div>
                    ` : ''}
                `;
                
                document.getElementById('viewModal').classList.add('show');
            } catch (err) {
                console.error('Error loading record:', err);
                alert('Failed to load record details');
            }
        }
        
        function closeModal() {
            document.getElementById('viewModal').classList.remove('show');
        }
        
        async function deleteRecord(id) {
            if (!confirm('Are you sure you want to delete this record?')) return;
            
            try {
                const response = await fetch(`/trucks-dispatching/api/documents/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadRecords();
                } else {
                    alert('Failed to delete record');
                }
            } catch (err) {
                console.error('Error deleting record:', err);
                alert('Failed to delete record');
            }
        }
        
        // Close modal on outside click
        document.getElementById('viewModal').addEventListener('click', (e) => {
            if (e.target.classList.contains('modal')) closeModal();
        });
        
        loadTrucks();
        loadRecords();
    </script>
</body>
</html>
